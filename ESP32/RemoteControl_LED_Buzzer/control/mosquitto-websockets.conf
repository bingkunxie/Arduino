# Mosquitto config for the study controller.
# Enables TWO listeners:
#   1883 = plain MQTT/TCP   -> the ESP32 stations connect here
#   9001 = MQTT over WebSockets -> the browser dashboard connects here
#
# Run with:  mosquitto -c mosquitto-websockets.conf -v
# (-v = verbose, so you can watch connections/messages while testing)

listener 1883
protocol mqtt

listener 9001
protocol websockets

# Local lab use only: allow connections without username/password.
# Do NOT use anonymous access on a public/internet-facing broker.
allow_anonymous true
